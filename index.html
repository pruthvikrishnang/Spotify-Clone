<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify - Web Player: Music for everyone</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="A pixel-perfect Spotify-inspired web music player. Listen to your favorite songs, create custom playlists, search artists and albums. Pure HTML, CSS, and JS.">
  <meta name="keywords" content="Spotify, Music Player, Web Player, Audio Streaming, Spotify Clone, Vanilla JavaScript, HTML5 Audio">
  <meta name="author" content="Antigravity">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Spotify - Web Player">
  <meta property="og:description" content="Sleek, responsive Spotify clone built with Vanilla JavaScript and CSS variables. Features full playback controls, playlists CRUD, and custom audio engine.">
  <meta property="og:image" content="https://images.unsplash.com/photo-1614680376593-902f74fa0d41?q=80&w=600&auto=format&fit=crop">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://images.unsplash.com/photo-1614680376593-902f74fa0d41?q=80&w=32&auto=format&fit=crop">

  <!-- CSS Style sheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Lucide Icons Library (Lightweight, SVG-based) -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  
  <!-- Application Layout -->
  <div class="app-container">
    
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="app-sidebar" aria-label="Main Navigation">
      <div class="sidebar-brand">
        <!-- Custom Green Spotify-Inspired Logo SVG -->
        <a href="#home" class="logo-link" aria-label="Spotify Home">
          <svg viewBox="0 0 24 24" width="32" height="32" class="logo-svg">
            <circle cx="12" cy="12" r="10" fill="var(--color-primary)"/>
            <path d="M16.6 15c-.2.3-.5.4-.8.2-2.2-1.4-5-1.7-8.3-.9-.4.1-.7-.2-.8-.5s.2-.7.5-.8c3.6-.8 6.7-.5 9.2 1 .3.2.4.6.2 1zm1.1-2.8c-.3.4-.8.5-1.1.3-2.5-1.6-6.4-2-8.7-1.3-.5.1-.9-.1-1.1-.6s.1-.9.6-1.1c2.8-.8 7.1-.4 10 1.4.4.2.5.8.3 1.3zm.1-2.9c-.3.4-.9.6-1.3.3-3-1.8-8-2-10.9-1.2-.6.2-1.2-.2-1.4-.7s.2-1.2.7-1.4c3.4-1 9-0.8 12.6 1.4.5.2.6.8.3 1.6z" fill="#000000"/>
          </svg>
          <span class="logo-text">Spotify<span class="logo-plus">Clone</span></span>
        </a>
      </div>

      <!-- Navigation Links -->
      <nav class="sidebar-nav">
        <ul>
          <li>
            <a href="#home" class="nav-item active" id="nav-home">
              <i data-lucide="home"></i>
              <span>Home</span>
            </a>
          </li>
          <li>
            <a href="#search" class="nav-item" id="nav-search">
              <i data-lucide="search"></i>
              <span>Search</span>
            </a>
          </li>
        </ul>
      </nav>

      <!-- Library and Playlist Management Section -->
      <div class="sidebar-library">
        <div class="library-header">
          <button class="library-title-btn" aria-label="Your Library">
            <i data-lucide="library"></i>
            <span>Your Library</span>
          </button>
          <button class="add-playlist-btn" id="create-playlist-sidebar-btn" title="Create Playlist" aria-label="Create Playlist">
            <i data-lucide="plus"></i>
          </button>
        </div>

        <!-- Sidebar Lists: Favorites and Playlists -->
        <div class="library-content custom-scrollbar">
          <ul class="library-playlists-list" id="sidebar-playlists-container">
            <!-- Liked Songs Permanent Item -->
            <li class="library-item active-item" id="library-liked-songs">
              <a href="#favorites" class="library-link">
                <div class="liked-songs-icon-wrapper">
                  <i data-lucide="heart" fill="white"></i>
                </div>
                <div class="library-item-info">
                  <span class="library-item-title">Liked Songs</span>
                  <span class="library-item-type">Playlist &bull; Auto</span>
                </div>
              </a>
            </li>
            <!-- Dynamic user-created playlists go here -->
          </ul>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content" id="app-main-content">
      
      <!-- Top Sticky Navigation Bar -->
      <header class="main-header" id="app-main-header">
        <div class="header-navigation-controls">
          <button class="nav-circle-btn" id="history-back-btn" aria-label="Go back">
            <i data-lucide="chevron-left"></i>
          </button>
          <button class="nav-circle-btn" id="history-forward-btn" aria-label="Go forward">
            <i data-lucide="chevron-right"></i>
          </button>
          
          <!-- Dynamic Search Input Container (Only visible on Search page) -->
          <div class="search-input-container hidden" id="header-search-container">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" placeholder="What do you want to listen to?" id="search-input-field" autocomplete="off" aria-label="Search songs, artists, or albums">
            <button class="search-clear-btn hidden" id="search-clear-btn" aria-label="Clear search">
              <i data-lucide="x"></i>
            </button>
          </div>
        </div>

        <!-- Header Actions (User profiles / Custom controls) -->
        <div class="header-actions">
          <button class="upgrade-badge-btn">Premium</button>
          <div class="user-profile-dropdown" id="user-menu-btn">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=150&auto=format&fit=crop" alt="Profile" class="user-avatar">
            <span class="user-name">Guest User</span>
            <i data-lucide="chevron-down"></i>
          </div>
        </div>
      </header>

      <!-- Scrollable Page Container -->
      <div class="page-container custom-scrollbar" id="page-content-viewport">
        <!-- Dynamic content will be injected here by ui.js -->
      </div>
    </main>

    <!-- Bottom Music Player Bar -->
    <footer class="player-bar" aria-label="Music Player Control">
      
      <!-- Left side: Playing track metadata -->
      <div class="player-track-info" id="player-track-display">
        <div class="track-artwork-wrapper">
          <img src="https://images.unsplash.com/photo-1614680376593-902f74fa0d41?q=80&w=80&auto=format&fit=crop" alt="No track" class="track-artwork" id="player-artwork">
          <!-- Active playing equalizer lines -->
          <div class="playing-animation-overlay hidden" id="playing-eq-animation">
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
          </div>
        </div>
        <div class="track-metadata">
          <div class="track-name-scroller">
            <span class="track-title" id="player-title">Select a track</span>
          </div>
          <span class="track-artist" id="player-artist">Artist</span>
        </div>
        <button class="track-like-btn" id="player-like-btn" title="Save to Liked Songs" aria-label="Like track">
          <i data-lucide="heart" class="heart-icon"></i>
        </button>
      </div>

      <!-- Middle: Playback controls and progress bar -->
      <div class="player-controls-section">
        <div class="control-buttons">
          <button class="player-btn toggle-btn" id="player-shuffle-btn" title="Enable Shuffle" aria-label="Shuffle tracks">
            <i data-lucide="shuffle"></i>
          </button>
          <button class="player-btn prev-btn" id="player-prev-btn" title="Previous Song" aria-label="Previous track">
            <i data-lucide="skip-back"></i>
          </button>
          <button class="player-btn play-pause-btn" id="player-play-btn" title="Play" aria-label="Play track">
            <i data-lucide="play" class="play-svg-icon" fill="black"></i>
          </button>
          <button class="player-btn next-btn" id="player-next-btn" title="Next Song" aria-label="Next track">
            <i data-lucide="skip-forward"></i>
          </button>
          <button class="player-btn toggle-btn" id="player-repeat-btn" title="Enable Repeat" aria-label="Repeat track">
            <i data-lucide="repeat"></i>
          </button>
        </div>
        <div class="progress-bar-container">
          <span class="time-elapsed" id="player-time-elapsed">0:00</span>
          <div class="progress-slider-wrapper" id="progress-slider-container">
            <div class="progress-slider-rail">
              <div class="progress-slider-fill" id="player-progress-fill"></div>
              <div class="progress-slider-handle" id="player-progress-handle"></div>
            </div>
          </div>
          <span class="time-duration" id="player-time-duration">0:00</span>
        </div>
      </div>

      <!-- Right side: Auxiliary actions (Queue, volume, mute) -->
      <div class="player-auxiliary-section">
        <button class="player-btn aux-btn" id="player-queue-btn" title="Play Queue" aria-label="View play queue">
          <i data-lucide="list-music"></i>
        </button>
        <div class="volume-control-wrapper">
          <button class="player-btn aux-btn" id="player-mute-btn" title="Mute" aria-label="Mute audio">
            <i data-lucide="volume-2" id="volume-icon"></i>
          </button>
          <div class="volume-slider-container" id="volume-slider-container">
            <div class="volume-rail">
              <div class="volume-fill" id="player-volume-fill"></div>
              <div class="volume-handle" id="player-volume-handle"></div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Invisible HTML5 Audio Node -->
      <audio id="main-audio-element" preload="auto"></audio>
    </footer>
  </div>

  <!-- Toast Notification Overlay -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <!-- Modal View: Create/Edit Playlist Detail Dialog -->
  <div class="modal-backdrop hidden" id="playlist-modal">
    <div class="modal-content-card">
      <div class="modal-header">
        <h2 class="modal-title" id="playlist-modal-title">Edit Details</h2>
        <button class="modal-close-btn" id="playlist-modal-close-btn" aria-label="Close modal">
          <i data-lucide="x"></i>
        </button>
      </div>
      <form class="modal-form" id="playlist-modal-form" novalidate>
        <div class="modal-row-wrapper">
          <div class="modal-playlist-artwork-selector">
            <div class="artwork-preview-placeholder" id="modal-artwork-preview">
              <i data-lucide="music" class="music-icon"></i>
            </div>
          </div>
          <div class="modal-input-fields">
            <div class="input-group">
              <label for="playlist-name-input">Name</label>
              <input type="text" id="playlist-name-input" placeholder="My Playlist" required autocomplete="off">
              <span class="error-text hidden" id="name-error">Playlist name is required.</span>
            </div>
            <div class="input-group">
              <label for="playlist-desc-input">Description</label>
              <textarea id="playlist-desc-input" placeholder="Add an optional description" rows="3" autocomplete="off"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button type="submit" class="modal-save-btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal View: Play Queue Modal Flyout -->
  <div class="queue-flyout-container hidden" id="queue-flyout">
    <div class="queue-header">
      <h3>Play Queue</h3>
      <button class="queue-close-btn" id="queue-close-btn" aria-label="Close queue">
        <i data-lucide="x"></i>
      </button>
    </div>
    <div class="queue-songs-list custom-scrollbar">
      <div class="queue-now-playing-section">
        <span class="queue-section-label">Now Playing</span>
        <div class="queue-track-row" id="queue-now-playing-container">
          <!-- Dynamically inserted now playing song -->
        </div>
      </div>
      <div class="queue-next-up-section">
        <div class="queue-next-up-header">
          <span class="queue-section-label">Next Up</span>
          <button class="clear-queue-btn" id="clear-queue-btn">Clear Queue</button>
        </div>
        <div class="queue-next-list" id="queue-next-container">
          <!-- Dynamically inserted upcoming songs -->
        </div>
      </div>
    </div>
  </div>

  <!-- Main JavaScript Bundler Entry -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
