name: Auto Commit

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "pruthvikrishnang"
          git config user.email "pruthvikrishnang3@gmail.com "

      - name: Make 20 commits
        run: |
          for i in $(seq 1 20); do
            echo "$(date -u '+%Y-%m-%d %H:%M:%S') - update $i" >> activity.log
            git add activity.log
            git commit -m "Activity update $i"
          done

      - name: Push changes
        run: git push